name: Publish permissions-core package to npmjs
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Install and Build 🔧
        run: |
          npm ci
          npm run build
          npm run format
      - name: Publish 🚀
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.LEVANTE_NPM_TOKEN }}
